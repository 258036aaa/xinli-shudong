<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心理树洞</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="bg-layer" aria-hidden="true"></div>
  <div class="page">
    <header class="header">
      <div class="logo">🌳</div>
      <h1>心理树洞</h1>
      <p class="subtitle">在这里，你可以安心地说出心里话</p>
      <p id="sessionBadge" class="session-badge hidden">
        专属号码：<span id="sessionCode"></span>
      </p>
    </header>

    <section class="daily-quote" aria-label="每日暖心签">
      <p class="daily-quote-label">每日暖心签</p>
      <p id="dailyQuoteText" class="daily-quote-text"></p>
    </section>

    <main class="main">
      <section class="card chat-card">
        <div class="chat-toolbar">
          <span class="chat-status">
            <span class="status-dot"></span>
            咨询师在线倾听中
          </span>
        </div>

        <div id="chatMessages" class="chat-messages">
          <div class="chat-welcome">
            <p>🍃 欢迎来到心理树洞</p>
            <p>写下你想说的话，咨询师会温柔地回应你</p>
          </div>
        </div>

        <div class="chat-input-area">
          <div class="emotion-section">
            <div class="emotion-tags" id="emotionTags">
              <button type="button" class="emotion-tag" data-emotion="焦虑">焦虑</button>
              <button type="button" class="emotion-tag" data-emotion="迷茫">迷茫</button>
              <button type="button" class="emotion-tag" data-emotion="开心">开心</button>
              <button type="button" class="emotion-tag" data-emotion="吐槽">吐槽</button>
            </div>
          </div>
          <div class="chat-compose">
            <textarea
              id="messageInput"
              class="chat-textarea"
              placeholder="说说你的心事..."
              rows="2"
              maxlength="2000"
            ></textarea>
            <button id="sendBtn" class="send-btn" type="button" aria-label="发送">发送</button>
          </div>
          <div class="compose-footer">
            <span id="charCount" class="char-count">0 / 2000</span>
          </div>
        </div>
      </section>

      <details class="card restore-card">
        <summary>在其他设备恢复对话</summary>
        <p class="hint">输入你的 6 位专属号码，可在此设备继续聊天</p>
        <div class="lookup-row">
          <input
            id="restoreInput"
            class="lookup-input"
            type="text"
            placeholder="例如：A1B2C3"
            maxlength="6"
            autocomplete="off"
            spellcheck="false"
          >
          <button id="restoreBtn" class="submit-btn" type="button">恢复</button>
        </div>
      </details>

      <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
    </main>

    <footer class="page-footer">
      <p>你的心声会被温柔倾听 · 完全匿名 · 安全保密</p>
      <a href="/admin-login" class="admin-entry-link">管理入口</a>
    </footer>
  </div>

  <div id="welcomeModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" id="welcomeBackdrop"></div>
    <div class="modal-content">
      <div class="modal-icon">🌿</div>
      <h2 class="modal-title">你的专属号码</h2>
      <p class="modal-subtitle">请记住您的专属号码，刷新页面后仍可继续对话</p>
      <div class="modal-code-box">
        <span id="welcomeCode" class="modal-query-code"></span>
      </div>
      <p class="modal-hint">号码已自动保存在本设备，也可在其他设备输入号码恢复</p>
      <div class="modal-actions">
        <button id="welcomeCopyBtn" class="modal-btn primary" type="button">复制号码</button>
        <button id="welcomeCloseBtn" class="modal-btn secondary" type="button">开始聊天</button>
      </div>
    </div>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
